server.port=8080
spring.main.web-application-type=reactive

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=http://user-service:8081 
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[1].id=driver-service
spring.cloud.gateway.routes[1].uri=http://driver-service:8082 
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/drivers/**

spring.cloud.gateway.routes[2].id=trip-service
spring.cloud.gateway.routes[2].uri=http://trip-service:8083 
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/trips/**
